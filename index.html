<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>AI Receptionist Demo</title>

  <!-- n8n chat styles -->
  <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />

  <style>
    body {
      font-family: Inter, system-ui, sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 60px 20px;
      text-align: center;
    }

    h1 {
      color: #1f2a44;
      font-size: 2.2rem;
    }

    p {
      color: #5c6b85;
      font-size: 1.1rem;
      margin-bottom: 30px;
    }
  </style>
</head>

<body>

  <h1>AI Receptionist for Clinics</h1>

  <p>
    Ask questions or book an appointment instantly using the assistant.
  </p>

  <p>
    Try asking:<br>
    • "Book appointment tomorrow"<br>
    • "Do you offer teeth whitening?"<br>
    • "What are your hours?"
  </p>

  <!-- n8n chat widget -->
  <script type="module">
    import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

    createChat({
      webhookUrl: 'https://sohamranmale.app.n8n.cloud/webhook/ffcf29b6-19e9-40fd-81a6-132910560043/chat',
      initialMessages: [
        'Hi! 👋 I am the clinic assistant.',
        'I can help you book an appointment or answer questions.'
      ]
    });
  </script>

</body>

</html>
